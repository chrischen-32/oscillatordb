<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mechanical Oscillator Database</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <nav class="nav">
    <a class="brand" href="{{ url_for('index') }}">OscillatorDB</a>
    <div>
      <a href="{{ url_for('index') }}">Database</a>
      <a href="{{ url_for('upload') }}">Upload</a>
      <a href="{{ url_for('visualize') }}">Visualize</a>
      <a href="{{ url_for('extract_text_direct') }}">Paste Text</a>
    </div>
  </nav>
  <main class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">{% for m in messages %}<p>{{ m }}</p>{% endfor %}</div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
