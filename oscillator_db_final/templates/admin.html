{% extends "base.html" %}
{% block content %}
<h1>Admin review</h1>
<p class="muted">Approve only after checking the evidence quote against the paper. Pending records are hidden from the default public search.</p>
{% for r in records %}
<form method="post" class="card admin-form">
  <input type="hidden" name="id" value="{{ r.id }}">
  <div class="form-grid">
    <label>Title<input name="title" value="{{ r.title or '' }}"></label>
    <label>Authors<input name="authors" value="{{ r.authors or '' }}"></label>
    <label>Year<input name="year" value="{{ r.year or '' }}"></label>
    <label>DOI<input name="doi" value="{{ r.doi or '' }}"></label>
    <label>Source URL<input name="source_url" value="{{ r.source_url or '' }}"></label>
    <label>Oscillator type<input name="oscillator_type" value="{{ r.oscillator_type or '' }}"></label>
    <label>Platform type<select name="platform_type">{% set current_platform_type = r.platform_type or r.oscillator_type or 'Other' %}{% for p in ['MEMS','NEMS / Nanomechanical','Optomechanical','Phononic crystal','SAW','BAW','FBAR','HBAR','Levitated','Quantum acoustic','Other'] %}<option value="{{ p }}" {% if current_platform_type == p %}selected{% endif %}>{{ p }}</option>{% endfor %}</select></label>
    <label>Material<input name="material" value="{{ r.material or '' }}"></label>
    <label>Platform<input name="platform" value="{{ r.platform or '' }}"></label>
    <label>Frequency Hz<input name="frequency_hz" value="{{ r.frequency_hz or '' }}"></label>
    <label>Quality factor Q<input name="quality_factor" value="{{ r.quality_factor or '' }}"></label>
    <label>f·Q Hz<input name="fq_product" value="{{ r.fq_product or '' }}"></label>
    <label>T1 seconds<input name="t1_seconds" value="{{ r.t1_seconds or '' }}"></label>
    <label>Temperature K<input name="temperature_k" value="{{ r.temperature_k or '' }}"></label>
    <label>Status
      <select name="validation_status">
        <option value="pending" {% if r.validation_status == 'pending' %}selected{% endif %}>pending</option>
        <option value="approved" {% if r.validation_status == 'approved' %}selected{% endif %}>approved</option>
        <option value="rejected" {% if r.validation_status == 'rejected' %}selected{% endif %}>rejected</option>
      </select>
    </label>
  </div>
  <label>Evidence quote<textarea name="evidence_quote">{{ r.evidence_quote or '' }}</textarea></label>
  <label>Notes<textarea name="notes">{{ r.notes or '' }}</textarea></label>
  <button class="button">Save record</button>
  <a href="{{ url_for('record', record_id=r.id) }}">View page</a>
</form>
{% else %}
<p>No records.</p>
{% endfor %}
{% endblock %}
